[pytest]
markers =
    fast: Tests that run in seconds with no external dependencies (static file analysis, unit tests)
    slow: Tests that require Docker, kubectl, or network I/O
    build: Requires docker compose build (slow, may bust cache)
    compose: Requires docker compose up (slow, requires Docker daemon)
    k8s: Requires kubectl installed in PATH
    e2e: Requires docker compose up AND a browser runtime (Cypress)
addopts = -v --tb=short
