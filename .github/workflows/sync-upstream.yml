name: Sync upstream (de-otelified)

# Re-applies de-otelification on top of a new upstream release and opens a PR.
#
# SECURITY: scheduled + manual only — never pull_request/pull_request_target, so a
# fork PR can never trigger a run that has the API key. The key lives in a protected
# environment that requires reviewer approval before the job can read it.

on:
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC
  workflow_dispatch:
    inputs:
      tag:
        description: "Upstream ref to sync to (default: latest vX.Y.Z release tag)"
        required: false
        type: string

permissions:
  contents: write          # create the sync branch
  pull-requests: write     # open the PR

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    environment: llm-sync           # protected env — requires reviewer approval; holds the secret
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0            # merge-base needs the whole graph

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pipeline + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r sync/requirements-sync.txt -r tests/requirements-tests.txt

      - name: Run resolver unit tests
        run: python -m pytest sync/tests/ -q

      - name: Configure git identity
        run: |
          git config user.name  "otelfree-sync-bot"
          git config user.email "otelfree-sync-bot@users.noreply.github.com"

      - name: Sync upstream + open PR
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          python -u sync/sync.py --push ${{ inputs.tag && format('--tag {0}', inputs.tag) || '' }}

      - name: Upload sync report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-report
          path: |
            sync/last_sync_report.md
            sync/last_sync_report.json
          if-no-files-found: ignore
